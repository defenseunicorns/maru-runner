name: Validate Lint
on: pull_request

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup golang
        uses: ./.github/actions/golang

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.55.2

      - name: Run pre-commit
        uses: pre-commit/action@f7acafac0271bdd064cdfa1b13f17b4350e565ed #
        with:
          extra_args: --all-files --verbose # pre-commit run --all-files --verbose

      - name: Run Revive Action by pulling pre-built image
        uses: docker://morphy/revive-action:v2@sha256:1d096ee3dd332113f7fb677d146337a3d92a24823623f2c2ab1d8e68f6c0eb14
        with:
          config: revive.toml
          # Exclude patterns, separated by semicolons (optional)
          exclude: "src/cmd/viper.go;src/config/lang/lang.go"
          # Path pattern (default: ./...)
          path: "./src/..."
